<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/shop.css">
  </head>
  <body>
    <!-- nav section.  -->
    <div id="navbar-placeholder"></div>
   <section class="filter-section">
    <div class="container ">
        <div class="filter-container ">
            <button class="filter-toggle" onclick="toggleMenu()">
                Filters <span class="arrow-down">▼</span>
            </button>

            <div class="filter-links" id="filterLinks">
                <a href="#" class="filter-item active">All Product</a>
                <a href="#" class="filter-item">Face</a>
                <a href="#" class="filter-item">Brow</a>
                <a href="#" class="filter-item">Eye</a>
                <a href="#" class="filter-item">Lip</a>
                <a href="#" class="filter-item">Sets</a>
            </div>

            <div class="sort-container">
                <span>Sort :</span>
                <select id="sort-select">
                    <option value="featured">Featured</option>
                    <option value="newest">Newest</option>
                </select>
            </div>
        </div>
    </div>
</section>
    <section class="global-container">
      <div class="sub-container">
      

        <div id="shop" class="product-grid"></div>
      </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/loadLayout.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/shop.js"></script>
  </body>
</html>
