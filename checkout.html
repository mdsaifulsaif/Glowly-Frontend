<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>checkout</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/checkout.css">
  </head>
  <body>
    <!-- nav section.  -->
    <div id="navbar-placeholder"></div>
    <div class="checkout-container sub-container">
      <h1 class="page-title">Checkout</h1>

      <div class="checkout-wrapper">
        <div class="shipping-section">
          <h3>Shipping Information</h3>
          <form id="checkout-form">
            <div class="form-row">
              <div class="form-group">
                <label>Full name</label>
                <input type="text" placeholder="Full name" required />
              </div>
              <div class="form-group">
                <label>Last name</label>
                <input type="text" placeholder="Last name" required />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Email" required />
              </div>
              <div class="form-group">
                <label>Phone</label>
                <input type="tel" placeholder="Phone" required />
              </div>
            </div>

            <div class="form-group">
              <label>Apartment, suite, etc. (optional)</label>
              <input
                type="text"
                placeholder="Apartment, suite, etc. (optional)"
              />
            </div>

            <div class="form-row city-row">
              <div class="form-group">
                <label>City</label>
                <input type="text" placeholder="City" required />
              </div>
              <div class="form-group">
                <label>State/Province</label>
                <select required>
                  <option value="">Select</option>
                  <option value="dhaka">Dhaka</option>
                </select>
              </div>
              <div class="form-group">
                <label>Postal Code</label>
                <input type="text" placeholder="Postal Code" required />
              </div>
            </div>

            <div class="form-group">
              <label>Country</label>
              <select required>
                <option value="bd">Country</option>
              </select>
            </div>

            <div class="shipping-method-section">
              <h3>Shipping Method</h3>
              <label class="method-card">
                <input type="radio" name="shipping" value="5.99" checked />
                <span class="method-info"
                  >Standard Shipping (5-7 business days)</span
                >
                <span class="method-price">$5.99</span>
              </label>
              <label class="method-card">
                <input type="radio" name="shipping" value="12.99" />
                <span class="method-info"
                  >Express Shipping (2-3 business days)</span
                >
                <span class="method-price">$12.99</span>
              </label>
              <label class="method-card">
                <input type="radio" name="shipping" value="24.99" />
                <span class="method-info"
                  >Overnight Shipping (1 business day)</span
                >
                <span class="method-price">$24.99</span>
              </label>
            </div>

            <div class="form-actions">
              <button type="submit" class="payment-btn">Payment &rarr;</button>
            </div>
          </form>
        </div>

        <div class="checkout-summary">
          <h3>Order Summary</h3>
          <div id="checkout-items-list"></div>
          <hr />
          <div class="summary-totals">
            <div class="summary-line">
              <span>Subtotal</span>
              <span id="summary-subtotal">$0.00</span>
            </div>
            <div class="summary-line">
              <span>Shipping</span>
              <span id="summary-shipping">$5.99</span>
            </div>
            <div class="summary-line total-line">
              <span>Total</span>
              <span id="summary-total">$0.00</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="footer-placeholder"></div>

    <script src="./js/config.js"></script>
    <script src="./js/app.js"></script>
    <script src="./js/loadLayout.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/checkout.js"></script>
  </body>
</html>
